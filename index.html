<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지도 분석 대시보드 V18</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#header{background:#1e293b;border-bottom:1px solid #334155;padding:8px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap}
#header h1{font-size:13px;color:#94a3b8;font-weight:600}
.divider{width:1px;height:20px;background:#334155}
.btn{padding:4px 10px;border:none;border-radius:5px;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit;white-space:nowrap}
.btn:hover{filter:brightness(1.12)}
.btn-del{background:#1e293b;color:#94a3b8;border:1px solid #334155}
.btn-active{outline:2px solid #f8fafc;box-shadow:0 0 0 3px rgba(248,250,252,.12)}
.btn-export{background:#10b981;color:#fff;margin-left:auto}
label.file-btn{padding:4px 10px;background:#334155;color:#e2e8f0;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700}
#fileInput{display:none}
.zoom-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
#zoom{width:80px;accent-color:#3b82f6}
.zoom-num{width:48px;background:#1e293b;border:1px solid #334155;border-radius:3px;color:#e2e8f0;font-size:11px;text-align:center;padding:2px;font-family:inherit}
.shortcut-hint{font-size:9px;color:#64748b}
#main{display:flex;flex:1;overflow:hidden}
#canvasWrap{flex:1;position:relative;background:#1a1a2e;overflow:hidden;cursor:crosshair}
#mapImg{position:absolute;transform-origin:0 0;display:none;pointer-events:none}
#cvs{position:absolute;top:0;left:0}
#canvasHint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#475569;pointer-events:none;font-size:14px}
#rightPanel{width:400px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#panelTabs{display:flex;border-bottom:1px solid #334155;flex-shrink:0}
.tab-btn{flex:1;padding:8px 4px;background:none;border:none;color:#64748b;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent}
.tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab-content{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column;gap:10px}
.tab-content.active{display:flex}
.tab-content::-webkit-scrollbar{width:4px}
.tab-content::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.card{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px}
.card-title{font-size:10px;font-weight:700;color:#64748b;margin-bottom:8px}
.field{margin-bottom:6px}
.field label{display:block;font-size:10px;color:#64748b;margin-bottom:2px}
.field input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:4px;color:#e2e8f0;font-size:12px;padding:4px 7px;font-family:inherit;outline:none}
.field input:focus{border-color:#3b82f6}
.auto-field{width:100%;background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;color:#38bdf8;font-size:12px;font-weight:700;padding:4px 7px}
.highlight-field{color:#fbbf24;border-color:#78350f}
.pct-input-wrap{display:flex;align-items:center;background:#1e293b;border:1px solid #334155;border-radius:4px;overflow:hidden}
.pct-input-wrap:focus-within{border-color:#3b82f6}
.pct-input-wrap input{flex:1;background:transparent;border:none;color:#e2e8f0;font-size:12px;padding:4px 4px 4px 7px;font-family:inherit;outline:none;width:0}
.pct-suffix{font-size:11px;font-weight:700;color:#64748b;padding-right:6px}
.bonus-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;margin-bottom:6px}
.bonus-row input[type="checkbox"]{width:15px;height:15px;accent-color:#f59e0b;cursor:pointer}
.bonus-label{flex:1;font-size:11px;font-weight:700;color:#e2e8f0}
.bonus-tag{font-size:10px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,.12);padding:2px 6px;border-radius:8px}
.slope-chk-wrap{display:flex;justify-content:center;cursor:pointer}
.slope-chk-wrap input[type="checkbox"]{width:13px;height:13px;accent-color:#f87171;cursor:pointer}
.openup-grid{width:100%;border-collapse:collapse}
.openup-grid td{padding:3px;text-align:center}
.openup-grid .area-label{font-size:9px;color:#64748b;font-weight:700}
.openup-input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:4px;color:#e2e8f0;font-size:11px;font-weight:700;padding:4px;text-align:center;font-family:inherit;outline:none}
.openup-input:focus{border-color:#3b82f6}
.analysis2-table{width:100%;border-collapse:collapse;font-size:10px}
.analysis2-table th{padding:4px 2px;text-align:center;font-size:9px;font-weight:700;color:#64748b;border-bottom:2px solid #334155}
.analysis2-table td{padding:3px 2px;text-align:center;border-bottom:1px solid #1e293b;vertical-align:middle}
.analysis2-table .a-label{font-weight:700;font-size:10px;text-align:left}
.analysis2-table .a-result{font-weight:700;color:#f59e0b}
.analysis2-table .a-result.zero{color:#334155}
.analysis2-table .total-result{color:#fbbf24;font-size:12px;font-weight:700}
.analysis2-table tfoot td{border-top:2px solid #334155;padding-top:4px}
.export-group{display:flex;gap:8px}
.export-group .btn{flex:1;padding:8px 4px;font-size:11px}
#previewWrap{background:#0f172a;border:1px solid #334155;border-radius:8px;overflow:hidden;position:relative}
#previewCanvas{width:100%;display:block}
#statusBar{background:#0f172a;border-top:1px solid #1e293b;padding:3px 14px;font-size:10px;color:#475569;flex-shrink:0;display:flex;gap:14px}
#statusBar b{color:#94a3b8}
</style>
</head>
<body>
<div id="header">
  <h1>지도 분석 V18</h1>
  <div class="divider"></div>
  <label class="file-btn" for="fileInput">지도 열기</label>
  <input type="file" id="fileInput" accept="image/*">
  <div class="zoom-wrap">배율<input type="range" id="zoom" min="0.5" max="1.2" step="0.01" value="1"><input type="number" id="zoomInput" class="zoom-num" value="1.00" min="0.5" max="1.2" step="0.01"></div>
  <div class="divider"></div>
  <button class="btn btn-active" id="cBtn" style="background:#475569;color:#fff" onclick="setMode('center')">중심점+반경</button>
  <button class="btn" id="gBtn" style="background:#7c3aed;color:#fff" onclick="setMode('grid')">격자 4x4</button>
  <button class="btn" id="mBtn" style="background:#ef4444;color:#fff" onclick="setMode('main')">주동선</button>
  <button class="btn" id="sBtn" style="background:#eab308;color:#fff" onclick="setMode('sub')">비동선</button>
  <button class="btn" id="aBtn" style="background:#6b7280;color:#fff" onclick="setMode('arrow')">화살표</button>
  <button class="btn" id="compBtn" style="background:#7c3aed;color:#fff" onclick="setMode('competitor')">경쟁사</button>
  <div class="divider"></div>
  <button class="btn btn-del" onclick="clearTrack('main')">주동선삭제</button>
  <button class="btn btn-del" onclick="clearTrack('sub')">비동선삭제</button>
  <button class="btn btn-del" onclick="clearTrack('arrow')">화살표삭제</button>
  <button class="btn btn-del" onclick="clearTrack('competitor')">경쟁사삭제</button>
  <button class="btn btn-del" onclick="clearAll()">전체초기화</button>
  <span class="shortcut-hint">Ctrl+Z 취소 | Enter 닫기 | 우클릭이동</span>
  <button class="btn btn-export" onclick="generatePreview()">미리보기</button>
</div>
<div id="main">
  <div id="canvasWrap">
    <div id="canvasHint"><p>좌측 상단 [지도 열기]로 이미지를 불러오세요</p></div>
    <img id="mapImg" alt=""><canvas id="cvs"></canvas>
  </div>
  <div id="rightPanel">
    <div id="panelTabs">
      <button class="tab-btn active" onclick="switchTab('data')">분석 데이터</button>
      <button class="tab-btn" onclick="switchTab('analysis')">면적 분석</button>
      <button class="tab-btn" onclick="switchTab('preview')">미리보기</button>
      <button class="tab-btn" onclick="switchTab('export')">내보내기</button>
    </div>
    <div id="tab-data" class="tab-content active">
      <div class="card"><div class="card-title">기본 정보</div>
        <div class="field"><label>주소</label><input type="text" id="addr" placeholder="주소를 입력하세요"></div>
      </div>
      <div class="card"><div class="card-title">임차조건 (단위: 만원)</div>
        <div style="display:flex;gap:6px">
          <div class="field" style="flex:1"><label>보증금</label><input type="text" id="d_deposit" placeholder="0"></div>
          <div class="field" style="flex:1"><label>월세(관리비)</label><input type="text" id="d_rent" placeholder="0"></div>
          <div class="field" style="flex:1"><label>권리금</label><input type="text" id="d_premium" placeholder="0"></div>
        </div>
      </div>
      <div class="card"><div class="card-title">타겟 수요</div>
        <div style="display:flex;gap:6px">
          <div class="field" style="flex:1"><label>배후수요</label><div class="auto-field" id="d_bg">0</div></div>
          <div class="field" style="flex:1"><label>타겟비율</label><div class="auto-field" id="d_ratio">0%</div></div>
          <div class="field" style="flex:1"><label>타겟수요</label><div class="auto-field highlight-field" id="d_target">0명</div></div>
        </div>
      </div>
      <div class="card"><div class="card-title">타겟 비율 <span style="color:#475569;font-size:9px;font-weight:400">숫자 입력시 % 자동</span></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <div class="field" style="flex:1;min-width:48px"><label>남20</label><div class="pct-input-wrap"><input type="text" id="d_m20" placeholder="0" oninput="onRatioChange()"><span class="pct-suffix">%</span></div></div>
          <div class="field" style="flex:1;min-width:48px"><label>남30</label><div class="pct-input-wrap"><input type="text" id="d_m30" placeholder="0" oninput="onRatioChange()"><span class="pct-suffix">%</span></div></div>
          <div class="field" style="flex:1;min-width:48px"><label>여20</label><div class="pct-input-wrap"><input type="text" id="d_f20" placeholder="0" oninput="onRatioChange()"><span class="pct-suffix">%</span></div></div>
          <div class="field" style="flex:1;min-width:48px"><label>여30</label><div class="pct-input-wrap"><input type="text" id="d_f30" placeholder="0" oninput="onRatioChange()"><span class="pct-suffix">%</span></div></div>
          <div class="field" style="flex:1;min-width:48px"><label>합계</label><div class="auto-field" id="d_total" style="text-align:center">0%</div></div>
        </div>
      </div>
      <div class="card"><div class="card-title">예상 매출액 및 월별 IRR</div>
        <a href="https://docs.google.com/spreadsheets/d/1YYQ20NpdzRUxIKCFDPhem9to_zdukGpJVYPkQEUUP18/edit?pli=1&gid=0#gid=0" target="_blank" style="display:inline-block;margin-bottom:8px;padding:4px 10px;background:#1e7e34;color:#fff;border-radius:4px;font-size:10px;font-weight:700;text-decoration:none">[구글시트] IRR산출양식</a>
        <div style="display:grid;grid-template-columns:48px 1fr 1fr 1fr;gap:5px;align-items:end;font-size:10px">
          <div></div><div style="color:#64748b;text-align:center;font-size:9px">예상매출액</div><div style="color:#64748b;text-align:center;font-size:9px">직영IRR</div><div style="color:#64748b;text-align:center;font-size:9px">가맹IRR</div>
          <div style="color:#64748b">평균</div><div class="field"><input type="text" id="d_avg_sales" placeholder="자동"></div><div class="field"><input type="text" id="d_avg_direct" placeholder="-"></div><div class="field"><input type="text" id="d_avg_fran" placeholder="-"></div>
          <div style="color:#64748b">상한</div><div class="field"><input type="text" id="d_hi_sales" placeholder="자동"></div><div class="field"><input type="text" id="d_hi_direct" placeholder="-"></div><div class="field"><input type="text" id="d_hi_fran" placeholder="-"></div>
          <div style="color:#64748b">하한</div><div class="field"><input type="text" id="d_lo_sales" placeholder="자동"></div><div class="field"><input type="text" id="d_lo_direct" placeholder="-"></div><div class="field"><input type="text" id="d_lo_fran" placeholder="-"></div>
        </div>
      </div>
    </div>
    <div id="tab-analysis" class="tab-content">
      <div class="card"><div class="card-title">전체 보정 조건</div>
        <label class="bonus-row"><input type="checkbox" id="chk-univ" onchange="onBonusChange()"><span class="bonus-label">대학가 입지</span><span class="bonus-tag">x1.43</span></label>
        <label class="bonus-row"><input type="checkbox" id="chk-comp" onchange="onBonusChange()"><span class="bonus-label">경쟁사 50m 이내</span><span class="bonus-tag" style="color:#f87171;background:rgba(248,113,133,.12)">x0.5</span></label>
      </div>
      <div class="card" style="padding:8px"><div class="card-title">오픈업 유동인구 입력 (4x4)</div>
        <table class="openup-grid"><tbody id="openupGridBody"></tbody></table>
      </div>
      <div class="card" style="padding:8px"><div class="card-title">구역별 동선 분석</div>
        <div id="cellStatsTable"><span style="color:#475569;font-size:11px">격자를 먼저 배치하세요</span></div>
      </div>
    </div>
    <div id="tab-preview" class="tab-content">
      <div id="previewWrap"><canvas id="previewCanvas"></canvas></div>
    </div>
    <div id="tab-export" class="tab-content">
      <div class="card"><div class="card-title">내보내기</div>
        <div class="export-group">
          <button class="btn" style="background:#7c3aed;color:#fff" onclick="exportPNG()">PNG 저장</button>
          <button class="btn" style="background:#dc2626;color:#fff" onclick="exportPPT()">PPT 저장</button>
        </div>
      </div>
      <div class="card"><div class="card-title">지도 스냅샷</div>
        <button class="btn" style="background:#334155;color:#e2e8f0;width:100%" onclick="exportMapOnly()">지도 영역 PNG</button>
      </div>
      <div class="card"><div class="card-title">구글 슬라이드 (추후 연동)</div>
        <div class="field"><input type="text" id="gslide-url" placeholder="구글 슬라이드 URL 붙여넣기"></div>
        <button class="btn" style="background:#4285f4;color:#fff;width:100%" onclick="exportToGoogleSlide()">구글 슬라이드에 추가</button>
      </div>
    </div>
  </div>
</div>
<div id="statusBar">
  <span>모드: <b id="st-mode">중심점+반경</b></span>
  <span>배율: <b id="st-zoom">1.00x</b></span>
</div>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="app.js"></script>
</body>
</html>
